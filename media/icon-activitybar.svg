     fill="none" stroke="currentColor" stroke-width="1.8"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- left branch curving into the trunk -->
  <path d="M5 4 V11 Q5 14 9 14 H15 Q19 14 19 11 V4"/>
  <!-- trunk -->
  <path d="M12 14 V20"/>
  <!-- nodes -->
  <circle cx="5"  cy="4"  r="1.6" fill="currentColor"/>
  <circle cx="19" cy="4"  r="1.6" fill="currentColor"/>
  <circle cx="12" cy="20" r="1.6" fill="currentColor"/>
</svg>
